name: Daily Cypress Smoke Tests

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  cypress-smoke:
    runs-on: ubuntu-latest
    container:
      image: cypress/included:10.7.0
      options: --shm-size=2gb
    outputs:
      result: ${{ steps.smoke.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix workspace permissions
        run: chmod -R 777 .

      - name: Install dependencies
        run: npm ci

      - name: Create cypress.env.json
        run: |
          cat > cypress.env.json << 'ENVEOF'
          {
            "baseUrl": "${{ secrets.CYPRESS_BASE_URL }}",
            "email": "${{ secrets.CYPRESS_EMAIL }}",
            "password": "${{ secrets.CYPRESS_PASSWORD }}",
            "Outboundcontact": "${{ secrets.CYPRESS_OUTBOUND_CONTACT }}",
            "OrgName": "${{ secrets.CYPRESS_ORG_NAME }}"
          }
          ENVEOF

      - name: Run Smoke Tests
        id: smoke
        run: npx cypress run --spec 'cypress/e2e/smoke_test/**/*.js' --browser electron
        continue-on-error: true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: cypress/screenshots/
          if-no-files-found: ignore

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-reports
          path: cypress/reports/
          if-no-files-found: ignore

      - name: Fail the job if tests failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1

  cypress-regression:
    runs-on: ubuntu-latest
    needs: cypress-smoke
    if: always()
    container:
      image: cypress/included:10.7.0
      options: --shm-size=2gb
    outputs:
      result: ${{ steps.regression.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix workspace permissions
        run: chmod -R 777 .

      - name: Install dependencies
        run: npm ci

      - name: Create cypress.env.json
        run: |
          cat > cypress.env.json << 'ENVEOF'
          {
            "baseUrl": "${{ secrets.CYPRESS_BASE_URL }}",
            "email": "${{ secrets.CYPRESS_EMAIL }}",
            "password": "${{ secrets.CYPRESS_PASSWORD }}",
            "Outboundcontact": "${{ secrets.CYPRESS_OUTBOUND_CONTACT }}",
            "OrgName": "${{ secrets.CYPRESS_ORG_NAME }}"
          }
          ENVEOF

      - name: Run Regression Tests
        id: regression
        run: npx cypress run --spec 'cypress/e2e/regression_test/**/*.js' --browser electron
        continue-on-error: true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-screenshots
          path: cypress/screenshots/
          if-no-files-found: ignore

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports
          path: cypress/reports/
          if-no-files-found: ignore

      - name: Fail the job if tests failed
        if: steps.regression.outcome == 'failure'
        run: exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [cypress-smoke, cypress-regression]
    if: always()

    steps:
      - name: Notify Slack - All Passed
        if: needs.cypress-smoke.result == 'success' && needs.cypress-regression.result == 'success'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Cypress Daily Tests — ALL PASSED*\n*Smoke:* Passed | *Regression:* Passed\n*Target:* darkmatter.votomobile.org\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Results>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_CYPRESS_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack - Failure
        if: needs.cypress-smoke.result == 'failure' || needs.cypress-regression.result == 'failure'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Cypress Daily Tests — FAILURES DETECTED*\n*Smoke:* ${{ needs.cypress-smoke.result }} | *Regression:* ${{ needs.cypress-regression.result }}\n*Target:* darkmatter.votomobile.org\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Results>\n*Screenshots:* Download from artifacts"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_CYPRESS_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
